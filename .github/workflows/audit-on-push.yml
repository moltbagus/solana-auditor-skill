name: Solana Security Audit (push)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Install skill
        run: git clone https://github.com/moltbagus/solana-auditor-skill.git ~/.claude/skills/solana-auditor-skill || true
      - name: Run audit
        run: claude --print "/audit-quick ."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Guard: only upload if SARIF actually exists. claude /audit-quick may
      # not produce a SARIF file (e.g., when no findings), and codeql-action
      # upload-sarif does NOT support an "if-no-files-found" input — it errors
      # with "Path does not exist" instead.
      - name: Upload SARIF (if produced)
        if: always() && hashFiles('audit-output/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: audit-output/results.sarif
          category: solana-sast