name: Solana Security Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Install skill
        run: git clone https://github.com/moltbagus/solana-auditor-skill.git ~/.claude/skills/solana-auditor-skill || true
      - name: Run audit
        run: claude --print "/audit-quick ."
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: audit-output/results.sarif
          category: solana-sast