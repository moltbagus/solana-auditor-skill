name: Solana Audit Quick (SAST)

on:
  push:
    paths:
      - 'programs/**/*.rs'
      - 'rules/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'programs/**/*.rs'
  workflow_dispatch:

jobs:
  sast:
    name: Fast SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SAST pre-commit scan
        run: |
          bash scripts/pre-commit-audit.sh || true

      - name: Convert findings to SARIF
        if: always()
        run: |
          python3 scripts/export-sarif.py --input .audit-precommit.json --output .audit-precommit.sarif || true

      # Guard: only upload if SARIF actually exists. codeql-action/upload-sarif
      # does NOT support "if-no-files-found" (that's an upload-artifact input) —
      # use hashFiles() to gate the step instead.
      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('.audit-precommit.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .audit-precommit.sarif
          category: solana-sast
