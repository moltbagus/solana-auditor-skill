name: Solana Security Audit (PR + cargo + anchor)

on:
  pull_request:
    paths:
      - 'programs/**/*.rs'
      - 'Anchor.toml'
      - 'Cargo.toml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit-tier1:
    name: SAST Audit (Tier 1)
    runs-on: ubuntu-latest
    # No Solana toolchain needed — runs SAST only
    steps:
      - uses: actions/checkout@v4
      - name: Run SAST audit
        run: |
          bash scripts/pre-commit-audit.sh || echo "SAST: warnings only"

  cargo-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo audit
        run: cargo audit || true

  anchor-build:
    name: Anchor Build Test
    runs-on: ubuntu-latest
    container: rust:1.75
    steps:
      - uses: actions/checkout@v4
      - name: Install Anchor
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
      - name: Build programs
        run: anchor build --verifiable 2>/dev/null || true
      - name: Run anchor test
        run: anchor test 2>/dev/null || true
