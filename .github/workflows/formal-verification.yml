name: Formal Verification

on:
  push:
    branches: [main, develop]
    paths:
      - 'programs/**'
      - 'scripts/**'
      - '.github/workflows/formal-verification.yml'
      - '**/*.qedspec'
  pull_request:
    paths:
      - 'programs/**'
      - 'scripts/**'
      - '.github/workflows/formal-verification.yml'
      - '**/*.qedspec'

jobs:
  formal-verification:
    name: QEDGen Formal Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.31.1 anchor-cli --locked 2>&1 | tail -5

      - name: Setup Node.js (for npx / QEDGen)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache QEDGen skill
        id: cache-qedgen
        uses: actions/cache@v4
        with:
          path: |
            ~/.claude/skills/qedgen
            .agents/skills/qedgen
          key: qedgen-solana-skills-${{ runner.os }}-${{ hashFiles('**/*.qedspec') }}

      - name: Install QEDGen skill
        if: steps.cache-qedgen.outputs.cache-hit != 'true'
        run: |
          npx skills add qedgen/solana-skills --yes 2>&1 || echo "::warning::QEDGen skill install failed; continuing anyway"
        shell: bash
        continue-on-error: true

      - name: Detect toolchain
        id: toolchain
        shell: bash
        run: |
          # Detect installed CLI tools (no 'local' — top-level script, not a function)
          anchor_found=false
          qed_solana_found=false
          jq_found=false
          qedgen_skill=false

          command -v anchor >/dev/null 2>&1 && anchor_found=true
          command -v qed-solana >/dev/null 2>&1 && qed_solana_found=true
          command -v jq >/dev/null 2>&1 && jq_found=true

          # QEDGen is an AI skill, not a CLI binary — check for skill files
          [ -d "$HOME/.claude/skills/qedgen" ] && qedgen_skill=true
          [ -d ".agents/skills/qedgen" ] && qedgen_skill=true

          echo "anchor=${anchor_found}" >> "$GITHUB_OUTPUT"
          echo "anchor_version=$(anchor --version 2>/dev/null | head -1 || echo 'not found')" >> "$GITHUB_OUTPUT"
          echo "qedgen=${qedgen_skill}" >> "$GITHUB_OUTPUT"
          echo "qed_solana=${qed_solana_found}" >> "$GITHUB_OUTPUT"
          echo "jq=${jq_found}" >> "$GITHUB_OUTPUT"

          echo "--- Toolchain Status ---"
          echo "  anchor: ${anchor_found}"
          echo "  qedgen (skill): ${qedgen_skill}"
          echo "  qed-solana: ${qed_solana_found}"
          echo "  jq: ${jq_found}"

      - name: Build Anchor programs
        if: steps.toolchain.outputs.anchor == 'true'
        run: |
          anchor build 2>&1 | tail -15 || true
        shell: bash
        continue-on-error: true

      - name: Validate .qedspec files
        id: specs
        run: |
          count=$(find . -name '*.qedspec' -maxdepth 3 2>/dev/null | wc -l)
          count=${count// /}
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          echo "Found ${count} .qedspec file(s)"

          if [ "${count}" -gt 0 ]; then
            echo "--- Validating .qedspec syntax ---"
            find . -name '*.qedspec' -maxdepth 3 -print0 | while IFS= read -r -d '' spec; do
              name=$(basename "$spec")
              echo "  Checking: $name"
              # Validate basic JSON structure
              if python3 -c "import json; json.load(open('$spec')); print('  ✓ JSON valid')" 2>&1; then
                : # valid
              else
                # Try YAML structure
                if python3 -c "import yaml; yaml.safe_load(open('$spec')); print('  ✓ YAML valid')" 2>&1; then
                  : # valid
                else
                  echo "  ⚠ $name: not JSON or YAML — assuming valid spec format"
                fi
              fi
            done
          fi
        shell: bash

      - name: Run QEDGen integration script
        if: steps.toolchain.outputs.qedgen == 'true' || steps.toolchain.outputs.anchor == 'true' || steps.specs.outputs.count != '0'
        run: |
          bash scripts/qed-integration.sh 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        shell: bash
        continue-on-error: true

      - name: No toolchain — graceful skip
        if: steps.toolchain.outputs.anchor == 'false' && steps.toolchain.outputs.qedgen == 'false' && steps.specs.outputs.count == '0'
        run: |
          echo "::notice::Formal verification skipped: no QEDGen skill, no Anchor CLI, and no .qedspec files found."
          echo ""
          echo "To enable formal verification locally:"
          echo "  npx skills add qedgen/solana-skills"
          echo ""
          echo "Then run formal verification via Claude Code with the QEDGen skill loaded."
        shell: bash

      - name: Upload formal verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-verification-report
          path: formal_verification_report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Print summary
        if: always()
        run: |
          if [ -f formal_verification_report.json ]; then
            echo "=== Formal Verification Report ==="
            cat formal_verification_report.json
          else
            echo "=== No report generated ==="
          fi
        shell: bash
