name: Formal Verification

on:
  push:
    branches: [main, develop]
    paths:
      - 'programs/**'
      - 'scripts/**'
      - '.github/workflows/formal-verification.yml'
      - '**/*.qedspec'
  pull_request:
    paths:
      - 'programs/**'
      - 'scripts/**'
      - '.github/workflows/formal-verification.yml'
      - '**/*.qedspec'

jobs:
  formal-verification:
    name: QEDGen Formal Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.31.1 anchor-cli --locked 2>&1 | tail -5

      - name: Setup Node.js (for npx / QEDGen)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache QEDGen skills
        id: cache-qedgen
        uses: actions/cache@v4
        with:
          path: ~/.claude/skills/qedgen
          key: qedgen-solana-skills-${{ runner.os }}-${{ hashFiles('**/*.qedspec') }}

      - name: Install QEDGen skill
        if: steps.cache-qedgen.outputs.cache-hit != 'true'
        run: |
          npx skills add qedgen/solana-skills --yes 2>&1 || echo "::warning::QEDGen skill install failed; will use fallback"
        shell: bash
        continue-on-error: true

      - name: Verify QEDGen installation
        id: toolchain
        run: |
          echo "anchor=$(command -v anchor 2>/dev/null && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "anchor_version=$(anchor --version 2>/dev/null | head -1 || echo 'not found')" >> $GITHUB_OUTPUT
          echo "qedgen=$(command -v qedgen 2>/dev/null && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "qed_solana=$(command -v qed-solana 2>/dev/null && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "jq=$(command -v jq 2>/dev/null && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Summary of toolchain
        run: |
          echo "=== Toolchain Status ==="
          echo "anchor: ${{ steps.toolchain.outputs.anchor }}"
          echo "qedgen: ${{ steps.toolchain.outputs.qedgen }}"
          echo "qed-solana: ${{ steps.toolchain.outputs.qed_solana }}"
          echo "jq: ${{ steps.toolchain.outputs.jq }}"

      - name: Build programs
        if: steps.toolchain.outputs.anchor == 'true'
        run: |
          anchor build 2>&1 | tail -10 || true
        shell: bash
        continue-on-error: true

      - name: Detect .qedspec files
        id: specs
        run: |
          count=$(find . -name '*.qedspec' -maxdepth 3 2>/dev/null | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Found $count .qedspec file(s)"

      - name: Run QEDGen spec check
        id: qedgen
        if: steps.toolchain.outputs.qedgen == 'true' && steps.specs.outputs.count != '0'
        run: |
          for spec in $(find . -name '*.qedspec' -maxdepth 3); do
            echo "=== Checking spec: $spec ==="
            qedgen check --spec "$spec" 2>&1 || true
          done
        shell: bash
        continue-on-error: true

      - name: Run QEDGen verify
        if: steps.toolchain.outputs.qedgen == 'true'
        run: |
          bash scripts/qed-integration.sh 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        shell: bash
        continue-on-error: true

      - name: Fallback anchor test invariants
        if: steps.toolchain.outputs.qedgen != 'true' && steps.toolchain.outputs.anchor == 'true'
        run: |
          if ! command -v anchor >/dev/null 2>&1; then
            echo "::notice::anchor CLI not available — skipping fallback test"
            exit 0
          fi
          for program in programs/*/Cargo.toml; do
            [ -f "$program" ] || continue
            dir=$(dirname "$program")
            name=$(basename "$dir")
            echo "=== Running anchor test for $name ==="
            (anchor test --skip-build 2>&1 | grep -E "PASS|FAIL|test result" || true)
          done
        shell: bash
        continue-on-error: true

      - name: No toolchain — graceful skip
        if: steps.toolchain.outputs.anchor != 'true' && steps.toolchain.outputs.qedgen != 'true'
        run: |
          echo "::notice::Formal verification skipped: no QEDGen or Anchor toolchain available."
          echo "Install QEDGen: npx skills add qedgen/solana-skills"
        shell: bash

      - name: Upload formal verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-verification-report
          path: formal_verification_report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Print summary
        if: always()
        run: |
          if [ -f formal_verification_report.json ]; then
            echo "=== Formal Verification Report ==="
            cat formal_verification_report.json
          else
            echo "=== No report — verification skipped ==="
          fi
        shell: bash
