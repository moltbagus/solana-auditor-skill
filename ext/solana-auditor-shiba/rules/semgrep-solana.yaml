  - id: solana-missing-nonce-check
    patterns:
      - pattern: |
          pub fn $FN(ctx: Context<$CTX>, ...) -> Result<()> {
            ...
            let $STATE = &mut ctx.accounts.$STATE_ACCOUNT;
            ...
