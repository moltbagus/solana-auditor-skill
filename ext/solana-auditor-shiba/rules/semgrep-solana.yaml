# =============================================================================
# Semgrep Ruleset for Solana/Anchor Security Auditing
# =============================================================================
# This ruleset augments the ripgrep-based audit.rules with semgrep's
# taint analysis and dataflow capabilities for deeper vulnerability detection.
#
# Usage:
#   semgrep --config=rules/semgrep-solana.yaml programs/
#   semgrep --config=rules/semgrep-solana.yaml --json programs/ > findings.json
#
# Categories:
#   - CRITICAL (9 rules): Fund drain, privilege escalation, CEI violations
#   - HIGH (8 rules): Missing validation, incorrect implementation
#   - MEDIUM (6 rules): Logic errors, unsafe patterns
#   - LOW (3 rules): Code quality, best practices
#
# Coverage: 26 vulnerability classes from audit.rules mapped to semgrep patterns
# =============================================================================

rules:
  # =========================================================================
  # CRITICAL SEVERITY RULES
  # =========================================================================

  # -----------------------------------------------------------------------------
  # Rule 1: Missing Signer Check on Privileged Operation
  # CWE-306: Missing Authentication for Critical Function
  # Real-world: Wormhole exploit (~$320M)
  # -----------------------------------------------------------------------------
  - id: anchor-missing-signer-check-priv-esc
    patterns:
      - pattern: |
          pub fn $FN(...) -> Result<()> {
            ...
            invoke($PROGRAM, $IX, $ACCOUNTS);
            ...
          }
      - pattern-not-regex: "(is_signer|with_signer|Signer)"
      - pattern-not-regex: "require.*signer|require_keys_eq.*authority"
    message: |
      CPI call without signer validation — potential privilege escalation.
      An attacker could invoke privileged operations without authorization.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-306
      cwe_url: https://cwe.mitre.org/data/definitions/306.html
      category: security
      technology:
        - anchor
        - solana
        - cpi
      references:
        - https://wormholecrypto.medium.com/wormhole-incident-report-02-02-22-ad9d9e1a0484

  # -----------------------------------------------------------------------------
  # Rule 2: Wrong Close Target (Lamport Drain)
  # CWE-377: Insecure Temporary File
  # Real-world: Cashio exploit (~$52M)
  # -----------------------------------------------------------------------------
  - id: anchor-close-wrong-destination
    patterns:
      - pattern: |
          close($DEST, $SRC, ...)
      - pattern-not-regex: "close.*authority|close.*admin|close.*$BUMP.*bump"
    message: |
      close instruction may send lamports to untrusted account.
      Verify the destination is a verified authority or expected PDA.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-377
      cwe_url: https://cwe.mitre.org/data/definitions/377.html
      category: security
      technology:
        - anchor
        - solana
      references:
        - https://www.cashio.space/posts/cashio-post-mortem

  # -----------------------------------------------------------------------------
  # Rule 3: State Mutation After External Call (CEI Violation)
  # CWE-362: Race Condition / CWE-841: Improper Workflow
  # Real-world: The DAO, multiple DeFi exploits
  # -----------------------------------------------------------------------------
  - id: solana-cei-violation-reentrancy
    patterns:
      - pattern: |
          fn $FN(...) -> Result<()> {
            ...
            invoke(...);
            ...
            self.$STATE.$MUTATE(...);
            ...
          }
      - pattern-not-regex: "reentrancy_guard|non_reentrant|locked"
      - pattern-not-regex: "let .*guard.*=.*clone"
    message: |
      CEI pattern violation — external call before state mutation enables reentrancy.
      Move all state updates before the invoke() call.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-362
      cwe_url: https://cwe.mitre.org/data/definitions/362.html
      cwe2: CWE-841
      cwe2_url: https://cwe.mitre.org/data/definitions/841.html
      category: security
      technology:
        - anchor
        - solana
        - reentrancy
      references:
        - https://github.com/trailofbits/solana-common-pitfalls#reentrancy

  # -----------------------------------------------------------------------------
  # Rule 4: Token Transfer After State Mutation (CEI Violation)
  # CWE-362: Race Condition
  # -----------------------------------------------------------------------------
  - id: solana-token-transfer-cei-violation
    patterns:
      - pattern: |
          fn $FN(...) -> Result<()> {
            ...
            anchor_spl::token::transfer(...);
            ...
            self.$STATE.$FIELD -= $AMOUNT;
            ...
          }
      - pattern-not-regex: "reentrancy_guard|non_reentrant"
      - pattern-not-regex: "\\$STATE\\..*=.*\\$STATE\\..*-=.*\\$AMOUNT.*;"
    message: |
      Token transfer executed before state update — reentrancy vulnerability.
      Apply Checks-Effects-Interactions pattern: update state BEFORE token transfer.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-362
      cwe_url: https://cwe.mitre.org/data/definitions/362.html
      category: security
      technology:
        - anchor
        - solana
        - token

  # -----------------------------------------------------------------------------
  # Rule 5: Unverified CPI Program ID
  # CWE-829: Inclusion of Functionality from Untrusted Control Sphere
  # Real-world: Wormhole exploit (~$320M)
  # -----------------------------------------------------------------------------
  - id: solana-unverified-cpi-program-id
    patterns:
      - pattern: |
          invoke($PROGRAM, ...)
      - pattern-not-regex: "verify|check|assert|require.*program"
    message: |
      CPI call with unverified program ID — attacker could control target program.
      Always validate program ID against a whitelist or expected constant.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-829
      cwe_url: https://cwe.mitre.org/data/definitions/829.html
      category: security
      technology:
        - solana
        - cpi

  # -----------------------------------------------------------------------------
  # Rule 6: Hardcoded PDA Bump
  # CWE-340: Predictable Numbers
  # Real-world: Cashio stablecoin (~$52M)
  # -----------------------------------------------------------------------------
  - id: solana-hardcoded-bump
    patterns:
      - pattern-regex: '&\[.*b"[^"]+".*,\s*&\[(254|255|[0-9]{1,3})\]'
      - pattern-regex: 'find_program_address.*,\s*\[.*,\s*\[(254|255|[0-9]{1,3})\]'
    message: |
      Hardcoded bump value detected — bump must be canonical (255) or derived.
      Use ctx.bumps.<account> or Pubkey::find_program_address without explicit bump.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-340
      cwe_url: https://cwe.mitre.org/data/definitions/340.html
      category: security
      technology:
        - solana
        - pda

  # -----------------------------------------------------------------------------
  # Rule 7: Missing remaining_accounts Validation
  # CWE-20: Improper Input Validation
  # Real-world: Raydium exploit (~$1.6M)
  # -----------------------------------------------------------------------------
  - id: anchor-missing-remaining-accounts-validation
    patterns:
      - pattern: |
          let $REM = ctx.remaining_accounts();
          ...
          $REM[$INDEX]
      - pattern-not-regex: "len\\(\\)|is_signer|is_writable|owner|require!"
    message: |
      remaining_accounts used without validation — attacker can inject malicious accounts.
      Validate length, signer/writable flags, and owner for each remaining account.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-20
      cwe_url: https://cwe.mitre.org/data/definitions/20.html
      category: security
      technology:
        - anchor
        - solana
        - cpi

  # -----------------------------------------------------------------------------
  # Rule 8: invoke_signed with Wrong Seeds
  # CWE-862: Missing Authorization
  # -----------------------------------------------------------------------------
  - id: solana-invoke-signed-wrong-seeds
    patterns:
      - pattern: |
          invoke_signed(
            $IX,
            $ACCS,
            &$SEEDS,
          )
      - pattern-not-regex: "b\".*\".*bump|b\".*\".*\\["
      - pattern-not-regex: "&\\[b\".*\",.*\\]"
    message: |
      invoke_signed called with potentially incorrect signer seeds.
      Verify seeds match the expected PDA derivation exactly.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-862
      cwe_url: https://cwe.mitre.org/data/definitions/862.html
      category: security
      technology:
        - solana
        - cpi

  # -----------------------------------------------------------------------------
  # Rule 9: Flash Loan Without Balance Validation
  # CWE-362: Race Condition
  # Real-world: Mango Markets, Nirvana Finance
  # -----------------------------------------------------------------------------
  - id: solana-flash-loan-no-balance-check
    patterns:
      - pattern: |
          fn $FN(...) -> Result<()> {
            ...
            anchor_spl::token::transfer(...);
            ...
            let $AMOUNT = $ACCOUNT.$FIELD;
            require!($AMOUNT >= ...);
          }
      - pattern-not-regex: "before|after|slot|Clock|blockhash|timestamp|staleness"
    message: |
      Balance check may occur after flash loan funds arrive — price/oracle manipulation risk.
      Validate balance snapshots or slot timestamps before flash-loan-sensitive operations.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-362
      cwe_url: https://cwe.mitre.org/data/definitions/362.html
      category: security
      technology:
        - solana
        - flash-loan

  # =========================================================================
  # HIGH SEVERITY RULES
  # =========================================================================

  # -----------------------------------------------------------------------------
  # Rule 10: AccountLoader Without Owner Check
  # CWE-345: Insufficient Verification of Data Authenticity
  # Real-world: Mango Markets
  # -----------------------------------------------------------------------------
  - id: anchor-accountloader-missing-owner-check
    patterns:
      - pattern: |
          AccountLoader<$T>::try_from(...)
      - pattern-not-regex: "\\.owner|verify|require.*owner"
    message: |
      AccountLoader used without explicit owner validation — use Account<T> instead
      or add manual owner check to prevent type confusion attacks.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-345
      cwe_url: https://cwe.mitre.org/data/definitions/345.html
      category: security
      technology:
        - anchor
        - solana

  # -----------------------------------------------------------------------------
  # Rule 11: Missing Owner Check on Token Account
  # CWE-345: Insufficient Verification of Data Authenticity
  # -----------------------------------------------------------------------------
  - id: anchor-token-account-missing-owner-check
    patterns:
      - pattern: |
          TokenAccount::try_from(...);
      - pattern-not-regex: "\\.owner|verify|require.*owner"
    message: |
      TokenAccount deserialized without owner verification — attacker could provide
      a malicious token account with inflated balance.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-345
      cwe_url: https://cwe.mitre.org/data/definitions/345.html
      category: security
      technology:
        - anchor
        - spl-token

  # -----------------------------------------------------------------------------
  # Rule 12: SPL Token vs Token-2022 Mismatch
  # CWE-345: Insufficient Verification of Data Authenticity
  # -----------------------------------------------------------------------------
  - id: solana-token-program-mismatch
    patterns:
      - pattern: |
          anchor_spl::token::transfer(...)
      - pattern-not-regex: "Token2022|token_2022|spl_token_2022"
    message: |
      Token transfer may use wrong token program — verify SPL vs Token-2022 compatibility.
      Mismatched programs will cause transfer failures or fund loss.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-345
      cwe_url: https://cwe.mitre.org/data/definitions/345.html
      category: security
      technology:
        - solana
        - spl-token
        - token-2022

  # -----------------------------------------------------------------------------
  # Rule 13: Missing Init Payer/Space Constraint
  # CWE-665: Improper Initialization
  # -----------------------------------------------------------------------------
  - id: anchor-missing-init-constraints
    patterns:
      - pattern: |
          #[account(init ...
          ...
          pub $ACCT: Account<'info, $T>
      - pattern-not-regex: "payer\\s*=|space\\s*=|mut\\s+"
    message: |
      #[account(init)] without payer= and space= constraints — account may
      fail initialization or be exploitable.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-665
      cwe_url: https://cwe.mitre.org/data/definitions/665.html
      category: security
      technology:
        - anchor
        - solana

  # -----------------------------------------------------------------------------
  # Rule 14: Reinit Without Discriminator Check
  # CWE-665: Improper Initialization
  # -----------------------------------------------------------------------------
  - id: anchor-reinit-without-discriminator-check
    patterns:
      - pattern: |
          pub fn $FN(... {
            let $ACCT = &mut ctx.accounts.$X;
            ...
            $ACCT.field = $VAL;
            ...
          }
      - pattern-not-regex: "discriminator|is_initialized|initialized|\\.bump\\s*="
    message: |
      Manual initialization without discriminator check — reinit attack possible.
      Verify account is uninitialized before writing state.
    severity: ERROR
    languages: [rust]
    metadata:
      cwe: CWE-665
      cwe_url: https://cwe.mitre.org/data/definitions/665.html
      category: security
      technology:
        - anchor

  # -----------------------------------------------------------------------------
  # Rule 15: Unchecked Unwrap on Untrusted Data
  # CWE-248: Uncaught Exception
  # -----------------------------------------------------------------------------
  - id: solana-unchecked-unwrap-deserialize
    patterns:
      - pattern: |
          try_from_slice::<$T>($DATA)?.unwrap()
      - pattern: |
          try_from_slice::<$T>($DATA).unwrap()
      - pattern: |
          $DATA.deserialize::<$T>()?.unwrap()
    message: |
      unwrap() on deserialization result — panics on malicious data, aborting tx.
      Use ? operator or explicit error handling instead.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-248
      cwe_url: https://cwe.mitre.org/data/definitions/248.html
      category: security
      technology:
        - solana
        - borsh

  # -----------------------------------------------------------------------------
  # Rule 16: Direct Lamport Transfer Breaking Rent Exemption
  # CWE-665: Improper Initialization
  # -----------------------------------------------------------------------------
  - id: solana-lamport-transfer-rent-break
    patterns:
      - pattern: |
          $SRC.lamports().sub_assign($AMT)?;
          $DST.lamports().add_assign($AMT)?;
      - pattern-not-regex: "rent|rental|minimum_balance"
    message: |
      Direct lamport transfer may break rent exemption invariant.
      Ensure recipient has minimum rent-exempt balance after transfer.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-665
      cwe_url: https://cwe.mitre.org/data/definitions/665.html
      category: security
      technology:
        - solana

  # -----------------------------------------------------------------------------
  # Rule 17: Missing Has One Constraint for Authority
  # CWE-285: Improper Authorization
  # -----------------------------------------------------------------------------
  - id: anchor-missing-has-one-authority
    patterns:
      - pattern: |
          #[derive(Accounts)]
          pub struct $NAME<'info> {
            #[account(mut)]
            pub $ADMIN: Account<'info, $T>,
            ...
          }
          pub fn $FN(ctx: Context<$NAME>, ...) {
            require!($ctx.accounts.$ADMIN.$FIELD == $EXPECTED, ...);
          }
      - pattern-not-regex: "has_one\\s*="
    message: |
      Authority validation via require! instead of has_one= constraint.
      Prefer has_one= for cleaner validation or ensure require! checks are comprehensive.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-285
      cwe_url: https://cwe.mitre.org/data/definitions/285.html
      category: security
      technology:
        - anchor

  # -----------------------------------------------------------------------------
  # Rule 18: Unsafe System Program Invocation
  # CWE-862: Missing Authorization
  # -----------------------------------------------------------------------------
  - id: solana-unsafe-system-program-call
    patterns:
      - pattern: |
          invoke(&system_instruction::$KIND($USER, ...), ...)
      - pattern-not-regex: "requires_system_transfer|is_writable"
      - pattern-not-regex: "invoke_signed.*system"
    message: |
      System program instruction may transfer lamports from user without proper validation.
      Verify the instruction is authorized and account ownership is checked.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-862
      cwe_url: https://cwe.mitre.org/data/definitions/862.html
      category: security
      technology:
        - solana
        - system-program

  # =========================================================================
  # MEDIUM SEVERITY RULES
  # =========================================================================

  # -----------------------------------------------------------------------------
  # Rule 19: Integer Overflow on Amount
  # CWE-190: Integer Overflow
  # -----------------------------------------------------------------------------
  - id: solana-integer-overflow-u64
    patterns:
      - pattern: |
          let $RESULT = $A + $B;
      - pattern: |
          let $RESULT = $A * $B;
      - pattern: |
          $AMOUNT = $X + $Y;
      - pattern-not-regex: "checked_|saturating_|try_add|try_mul|add_assign.*checked"
    message: |
      Potential integer overflow — use checked_add/checked_mul for u64 amounts.
      Arithmetic on u64 wraps silently in release mode.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-190
      cwe_url: https://cwe.mitre.org/data/definitions/190.html
      category: security
      technology:
        - solana
        - rust

  # -----------------------------------------------------------------------------
  # Rule 20: Division by Zero in Share Calculation
  # CWE-369: Divide by Zero
  # -----------------------------------------------------------------------------
  - id: solana-division-by-zero
    patterns:
      - pattern: |
          $A / $B
      - pattern: |
          $A % $B
      - pattern-not-regex: "checked_div|saturating_div"
      - pattern-not-regex: "if.*==.*0|require.*!.*0"
    message: |
      Division without zero check — potential division by zero in share calculations.
      Add guard or use checked_div.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-369
      cwe_url: https://cwe.mitre.org/data/definitions/369.html
      category: security
      technology:
        - solana

  # -----------------------------------------------------------------------------
  # Rule 21: Panic in Instruction
  # CWE-754: Improper Check for Unusual Conditions
  # -----------------------------------------------------------------------------
  - id: solana-panic-in-instruction
    patterns:
      - pattern-regex: "panic!\\(|unwrap\\(\\)|expect\\([^)]*\\)"
      - pattern-regex: "assert!\\(|assert_eq!\\(|assert_ne!\\("
    message: |
      panic!, unwrap(), or expect() in instruction — panics abort the transaction
      and may leave state inconsistent. Use Result propagation with ?.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-754
      cwe_url: https://cwe.mitre.org/data/definitions/754.html
      category: security
      technology:
        - solana

  # -----------------------------------------------------------------------------
  # Rule 22: Missing Error Enum Mapping
  # CWE-754: Improper Check for Unusual Conditions
  # -----------------------------------------------------------------------------
  - id: anchor-missing-error-mapping
    patterns:
      - pattern: |
          Err($PROGRAM_ERROR)
      - pattern-not-regex: "MyError|ErrorCode|anchor_lang::error::Error"
    message: |
      Raw program error propagated instead of mapped to anchor error enum.
      Convert to typed error: Err(MyError::Variant.into())
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-754
      cwe_url: https://cwe.mitre.org/data/definitions/754.html
      category: security
      technology:
        - anchor

  # -----------------------------------------------------------------------------
  # Rule 23: Unchecked CPI Return Data
  # CWE-252: Unchecked Return Value
  # -----------------------------------------------------------------------------
  - id: solana-unchecked-cpi-return
    patterns:
      - pattern: |
          invoke(...);
          ...
          $VAR = $RESULT;
      - pattern-not-regex: "\\?\\s*$|match.*Ok|if.*is_err|require!"
    message: |
      CPI result may not be checked — errors from called program could be ignored.
      Always propagate CPI results with ?.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-252
      cwe_url: https://cwe.mitre.org/data/definitions/252.html
      category: security
      technology:
        - solana
        - cpi

  # -----------------------------------------------------------------------------
  # Rule 24: Reentrancy Guard Not Checked Before External Call
  # CWE-362: Race Condition
  # -----------------------------------------------------------------------------
  - id: solana-reentrancy-guard-not-checked
    patterns:
      - pattern: |
          let $GUARD = $STATE.$FIELD;
          ...
          invoke(...);
          ...
          require!($STATE.$FIELD == $GUARD, ...);
      - pattern-not-regex: "require!.*$GUARD|if.*$GUARD|assert!"
    message: |
      Reentrancy guard value read before external call but not checked.
      Guard must be validated BEFORE the call, not after.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-362
      cwe_url: https://cwe.mitre.org/data/definitions/362.html
      category: security
      technology:
        - solana

  # =========================================================================
  # LOW SEVERITY RULES
  # =========================================================================

  # -----------------------------------------------------------------------------
  # Rule 25: TODO/FIXME in Security-Critical Code
  # CWE-489: Leftover Debug Code
  # -----------------------------------------------------------------------------
  - id: solana-todo-in-instruction
    patterns:
      - pattern-regex: "(TODO|FIXME|HACK|XXX|BUG):.*"
    message: |
      TODO/FIXME marker in instruction code — incomplete security logic.
      Security-critical code must not contain unfinished sections.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-489
      cwe_url: https://cwe.mitre.org/data/definitions/489.html
      category: security
      technology:
        - solana

  # -----------------------------------------------------------------------------
  # Rule 26: Unnecessary Clone on Large Data
  # CWE-400: Uncontrolled Resource Consumption
  # -----------------------------------------------------------------------------
  - id: solana-unnecessary-clone
    patterns:
      - pattern-regex: "\\.clone\\(\\)"
      - pattern-not-regex: "Arc|Rc|Cow|String|str\\["
    message: |
      Unnecessary clone on potentially large account data.
      Consider borrowing with & or removing clone if data is small.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-400
      cwe_url: https://cwe.mitre.org/data/definitions/400.html
      category: security
      technology:
        - solana

  # -----------------------------------------------------------------------------
  # Rule 27: Missing Staleness Check for Oracle
  # CWE-841: Improper Workflow
  # -----------------------------------------------------------------------------
  - id: solana-oracle-staleness-check
    patterns:
      - pattern: |
          let $PRICE = $ORACLE.$PRICE_FIELD;
          ...
          require!(...);
      - pattern-not-regex: "slot|timestamp|Clock|staleness|confidence|stale|max_age"
    message: |
      Oracle price used without staleness validation — attacker can use stale price.
      Add slot/timestamp comparison or staleness threshold check.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-841
      cwe_url: https://cwe.mitre.org/data/definitions/841.html
      category: security
      technology:
        - solana
        - oracle

  # -----------------------------------------------------------------------------
  # Rule 28: User-Supplied Memo Without Validation
  # CWE-20: Improper Input Validation
  # -----------------------------------------------------------------------------
  - id: solana-user-supplied-memo
    patterns:
      - pattern: |
          invoke(
            &spl_memo::instruction::build($MEMO),
            ...
          )
      - pattern-not-regex: "b\\\".*\\\"|verify|check|validate"
    message: |
      User-supplied data may be used in memo — log injection or social engineering risk.
      Validate memo content or use program-controlled strings only.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-20
      cwe_url: https://cwe.mitre.org/data/definitions/20.html
      category: security
      technology:
        - solana
        - spl-memo

  # -----------------------------------------------------------------------------
  # Rule 29: BorshDeserialize Without Version Handling
  # CWE-681: Incorrect Calculation
  # -----------------------------------------------------------------------------
  - id: solana-borsh-version-handling
    patterns:
      - pattern: |
          try_from_slice::<$T>(...)
      - pattern-not-regex: "version|VERSION|schema|upgrade"
    message: |
      Borsh deserialization without version field — future upgrades may break.
      Consider adding a version field for forward compatibility.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-681
      cwe_url: https://cwe.mitre.org/data/definitions/681.html
      category: security
      technology:
        - solana
        - borsh

  # -----------------------------------------------------------------------------
  # Rule 30: Insufficient Logging for Security Events
  # CWE-778: Insufficient Logging
  # -----------------------------------------------------------------------------
  - id: solana-missing-security-logging
    patterns:
      - pattern: |
          pub fn $FN(...) -> Result<()> {
            ...
            require!($A == $B, $ERR);
            ...
          }
      - pattern-not-regex: "msg!|emit!|log!"
    message: |
      Security-critical validation without emit/msg logging — dificulta audit trail.
      Add msg!() or emit!() for all authorization checks and important state changes.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-778
      cwe_url: https://cwe.mitre.org/data/definitions/778.html
      category: security
      technology:
        - anchor
        - solana

  # =========================================================================
  # PATTERN-BASED DETECTION RULES (complement taint analysis)
  # =========================================================================

  # -----------------------------------------------------------------------------
  # Rule 31: User-Controlled Amount Used in Transfer
  # Pattern-based detection complementing taint analysis
  # CWE-190: Integer Overflow
  # -----------------------------------------------------------------------------
  - id: solana-user-amount-in-transfer
    patterns:
      - pattern: |
          fn $FN(ctx: Context<$CTX>, $ARG: u64, ...) -> Result<()> {
            ...
            anchor_spl::token::transfer(ctx.accounts.$CTX(), $ARG, ...);
          }
    message: |
      Function parameter amount flows directly into token transfer.
      Ensure amount is validated and uses checked arithmetic.
    severity: WARNING
    languages: [rust]
    metadata:
      cwe: CWE-190
      cwe_url: https://cwe.mitre.org/data/definitions/190.html
      category: security
      technology:
        - anchor
        - solana

  # -----------------------------------------------------------------------------
